<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LeetCode Company Questions</title>
<style>
:root{
  --bg:#0d0f16;--sf:#141720;--s2:#1c2030;--border:#252a3d;
  --accent:#7c6aff;--a2:#a78bfa;--text:#dde3f0;--muted:#566080;
  --easy:#22c55e;--med:#f59e0b;--hard:#ef4444;--heart:#f43f5e;--done:#22c55e;
  --sh1:0 1px 2px rgba(0,0,0,.4),0 3px 6px rgba(0,0,0,.25),0 10px 20px rgba(0,0,0,.15);
  --sh2:0 1px 2px rgba(0,0,0,.4),0 4px 10px rgba(0,0,0,.25),0 16px 32px rgba(0,0,0,.15),0 0 0 1px rgba(124,106,255,.2),0 8px 32px rgba(124,106,255,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-feature-settings:'ss01'}

/* ── Header ── */
#app-header{
  position:sticky;top:0;z-index:50;
  background:rgba(13,15,22,.82);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid rgba(255,255,255,.04);
  height:52px;padding:0 20px;
  display:flex;align-items:center;gap:16px;
}
.logo{font-size:.9rem;font-weight:800;letter-spacing:-.03em;white-space:nowrap}
.logo em{font-style:normal;color:var(--a2)}
nav{display:flex;gap:1px;background:var(--s2);border-radius:10px;padding:3px;border:1px solid var(--border)}
.nav-btn{
  padding:5px 13px;border-radius:7px;font-size:.8rem;cursor:pointer;
  background:transparent;border:none;color:var(--muted);transition:all .18s;font-weight:500;white-space:nowrap;
}
.nav-btn:hover{color:var(--text)}
.nav-btn.active{
  background:var(--sf);color:var(--text);
  box-shadow:0 1px 3px rgba(0,0,0,.35),0 0 0 1px rgba(255,255,255,.04);
}
.nbadge{
  display:inline-flex;align-items:center;justify-content:center;
  margin-left:5px;background:var(--heart);color:#fff;
  font-size:.58rem;font-weight:700;min-width:16px;height:16px;padding:0 4px;
  border-radius:20px;vertical-align:middle;
}
#refresh-btn{
  margin-left:auto;background:none;border:1px solid var(--border);border-radius:8px;
  padding:4px 11px;font-size:.7rem;color:var(--muted);cursor:pointer;transition:all .18s;
}
#refresh-btn:hover{border-color:var(--accent);color:var(--a2)}

/* ── Views ── */
.view{display:none}
.view.active{display:block}

/* ══════ HOME ══════ */
.hero{
  padding:64px 28px 52px;text-align:center;position:relative;overflow:hidden;
  background:radial-gradient(ellipse 70% 55% at 50% -5%,rgba(124,106,255,.22) 0%,transparent 65%);
}
.hero::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background-image:radial-gradient(circle,rgba(124,106,255,.1) 1px,transparent 1px);
  background-size:26px 26px;
  mask-image:radial-gradient(ellipse 85% 90% at 50% 0%,black 30%,transparent 80%);
  -webkit-mask-image:radial-gradient(ellipse 85% 90% at 50% 0%,black 30%,transparent 80%);
}
.hero-eyebrow{
  display:inline-flex;align-items:center;gap:6px;margin-bottom:18px;
  font-size:.72rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
  color:var(--a2);position:relative;
  background:rgba(124,106,255,.1);border:1px solid rgba(124,106,255,.2);
  padding:4px 12px;border-radius:20px;
}
.hero-eyebrow::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--a2);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.hero h1{
  font-size:3rem;font-weight:900;letter-spacing:-.05em;line-height:1.05;
  margin-bottom:14px;position:relative;
}
.hero h1 .thin{font-weight:300;color:var(--muted)}
.hero h1 .grad{
  background:linear-gradient(125deg,#e2e8f0 0%,#a78bfa 50%,#7c6aff 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.hero p{font-size:.9rem;color:var(--muted);margin-bottom:32px;position:relative;line-height:1.6}
.hero-search-wrap{position:relative;max-width:440px;margin:0 auto}
#hero-search{
  width:100%;padding:14px 48px 14px 20px;border-radius:14px;
  background:rgba(20,23,32,.8);border:1px solid var(--border);
  color:var(--text);font-size:.92rem;outline:none;
  transition:border-color .2s,box-shadow .2s;
  box-shadow:0 1px 2px rgba(0,0,0,.3),inset 0 1px 1px rgba(0,0,0,.2);
}
#hero-search:focus{border-color:rgba(124,106,255,.5);box-shadow:0 0 0 3px rgba(124,106,255,.12),0 2px 8px rgba(0,0,0,.2)}
#hero-search::placeholder{color:var(--muted)}
.srch-ico{position:absolute;right:15px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}
#hero-drop{
  position:absolute;top:calc(100% + 6px);left:0;right:0;
  background:var(--sf);border:1px solid var(--border);border-radius:12px;
  overflow:hidden;z-index:100;max-height:256px;overflow-y:auto;
  box-shadow:0 4px 8px rgba(0,0,0,.3),0 16px 48px rgba(0,0,0,.4);display:none;
}
#hero-drop.open{display:block}
#hero-drop::-webkit-scrollbar{width:4px}
#hero-drop::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px}
.drop-item{display:flex;align-items:center;gap:10px;padding:9px 14px;cursor:pointer;transition:background .1s;font-size:.84rem}
.drop-item:hover{background:var(--s2)}
.drop-ico{width:22px;height:22px;border-radius:5px;background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:.6rem;font-weight:700;text-transform:uppercase;color:var(--a2);flex-shrink:0}

/* sections */
.home-section{padding:28px 24px 0}
.sec-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:18px;gap:12px}
.sec-title{font-size:.82rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);display:flex;align-items:center;gap:8px}
.sec-title::before{content:'';width:3px;height:14px;background:var(--accent);border-radius:2px;display:block}
.sec-more{font-size:.78rem;color:var(--a2);cursor:pointer;background:none;border:none;font-weight:500;transition:opacity .15s;letter-spacing:.01em}
.sec-more:hover{opacity:.7}

/* company card grid */
.co-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(144px,1fr));gap:10px;padding-bottom:28px}
.co-card{
  background:linear-gradient(145deg,var(--sf) 0%,rgba(28,32,48,.9) 100%);
  border:1px solid var(--border);border-radius:16px;
  padding:18px 14px 15px;cursor:pointer;position:relative;
  display:flex;flex-direction:column;align-items:center;gap:10px;text-align:center;
  transition:transform .2s cubic-bezier(.34,1.56,.64,1),border-color .18s,box-shadow .18s;
  box-shadow:var(--sh1);
}
.co-card:hover{transform:translateY(-4px) scale(1.01);border-color:rgba(124,106,255,.35);box-shadow:var(--sh2)}
.co-card.is-fav{border-color:rgba(244,63,94,.25);box-shadow:0 2px 6px rgba(0,0,0,.3),0 8px 20px rgba(244,63,94,.06)}
.co-card.is-fav:hover{border-color:rgba(244,63,94,.45);box-shadow:0 4px 12px rgba(0,0,0,.3),0 16px 32px rgba(244,63,94,.1)}
.card-heart{
  position:absolute;top:9px;right:9px;background:none;border:none;cursor:pointer;
  padding:4px;border-radius:6px;color:var(--muted);transition:color .15s,transform .2s cubic-bezier(.34,1.56,.64,1);
}
.card-heart:hover,.card-heart.on{color:var(--heart);transform:scale(1.2)}
.co-logo-wrap{
  width:54px;height:54px;border-radius:14px;
  display:flex;align-items:center;justify-content:center;overflow:hidden;
  box-shadow:0 2px 6px rgba(0,0,0,.35),inset 0 1px 0 rgba(255,255,255,.1);flex-shrink:0;
}
.co-logo-wrap img{width:28px;height:28px;object-fit:contain;filter:brightness(0) invert(1)}
.co-card-name{font-size:.8rem;font-weight:600;text-transform:capitalize;color:var(--text);line-height:1.3;letter-spacing:-.01em}

/* ══════ BROWSE ══════ */
#view-browse.active{display:grid;grid-template-columns:255px 1fr;height:calc(100vh - 52px)}
#sidebar{border-right:1px solid rgba(255,255,255,.04);display:flex;flex-direction:column;overflow:hidden;background:rgba(13,15,22,.4)}
#search-wrap{padding:10px;border-bottom:1px solid rgba(255,255,255,.04)}
#company-search{
  width:100%;background:var(--s2);border:1px solid var(--border);border-radius:8px;
  padding:7px 11px;color:var(--text);font-size:.83rem;outline:none;transition:border-color .15s;
}
#company-search:focus{border-color:var(--accent)}
#company-search::placeholder{color:var(--muted)}
#company-list{overflow-y:auto;flex:1;padding:5px}
#company-list::-webkit-scrollbar{width:3px}
#company-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px}
.ci{
  display:flex;align-items:center;gap:8px;padding:6px 8px 6px 10px;border-radius:8px;
  cursor:pointer;font-size:.82rem;transition:background .1s,box-shadow .1s;color:var(--text);
}
.ci:hover{background:rgba(124,106,255,.07)}
.ci.active{background:rgba(124,106,255,.1);color:var(--a2);box-shadow:inset 2px 0 0 var(--accent)}
.ci-icon{
  width:22px;height:22px;border-radius:5px;background:var(--s2);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-size:.58rem;font-weight:700;text-transform:uppercase;flex-shrink:0;color:var(--a2);
}
.ci.active .ci-icon{background:rgba(124,106,255,.15);border-color:rgba(124,106,255,.25)}
.ci-name{flex:1;text-transform:capitalize;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ci-heart{background:none;border:none;cursor:pointer;padding:3px;color:transparent;transition:color .15s,transform .18s;flex-shrink:0;line-height:1}
.ci:hover .ci-heart{color:var(--muted)}
.ci-heart.on,.ci-heart:hover{color:var(--heart)!important;transform:scale(1.15)}

/* content panel */
#content{display:flex;flex-direction:column;overflow:hidden}
#empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--muted)}
#empty-state svg{opacity:.15}
#empty-state p{font-size:.85rem}
#empty-state .hint{font-size:.75rem;opacity:.55}

#q-header{padding:14px 18px 12px;display:none;flex-direction:column;gap:10px;border-bottom:1px solid rgba(255,255,255,.04)}
#q-header.visible{display:flex}
.q-title-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
#q-company-name{font-size:1rem;font-weight:700;text-transform:capitalize;letter-spacing:-.02em}
.qco-heart{background:none;border:none;cursor:pointer;color:var(--muted);padding:3px;transition:color .15s,transform .18s;line-height:1}
.qco-heart:hover,.qco-heart.on{color:var(--heart);transform:scale(1.15)}
.stat-chips{display:flex;gap:4px;margin-left:auto}
.sc{font-size:.62rem;padding:2px 8px;border-radius:20px;border:1px solid;font-weight:600;font-variant-numeric:tabular-nums}
.sc.e{color:var(--easy);border-color:rgba(34,197,94,.3);background:rgba(34,197,94,.07)}
.sc.m{color:var(--med);border-color:rgba(245,158,11,.3);background:rgba(245,158,11,.07)}
.sc.h{color:var(--hard);border-color:rgba(239,68,68,.3);background:rgba(239,68,68,.07)}
.sc.d{color:var(--done);border-color:rgba(34,197,94,.3);background:rgba(34,197,94,.07)}

/* period tabs + filters */
.period-tabs{display:flex;gap:4px;flex-wrap:wrap}
.ptab{
  padding:4px 10px;border-radius:20px;font-size:.7rem;cursor:pointer;
  background:var(--s2);border:1px solid var(--border);color:var(--muted);transition:all .15s;
}
.ptab:hover{border-color:var(--accent);color:var(--a2)}
.ptab.active{background:rgba(124,106,255,.15);border-color:rgba(124,106,255,.4);color:var(--a2)}

.q-search-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
#q-search{
  flex:1;min-width:100px;background:var(--s2);border:1px solid var(--border);border-radius:8px;
  padding:6px 11px;color:var(--text);font-size:.83rem;outline:none;transition:border-color .15s;
}
#q-search:focus{border-color:var(--accent)}
#q-search::placeholder{color:var(--muted)}
.diff-filter{display:flex;gap:3px}
.diff-btn{
  padding:5px 9px;border-radius:6px;font-size:.68rem;font-weight:600;cursor:pointer;
  background:var(--s2);border:1px solid var(--border);color:var(--muted);transition:all .15s;
}
.diff-btn:hover{border-color:var(--accent);color:var(--a2)}
.diff-btn.ae{background:rgba(34,197,94,.1);border-color:rgba(34,197,94,.4);color:var(--easy)}
.diff-btn.am{background:rgba(245,158,11,.1);border-color:rgba(245,158,11,.4);color:var(--med)}
.diff-btn.ah{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.4);color:var(--hard)}

/* done filter */
.done-tabs{display:flex;gap:2px;background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:2px}
.dt{padding:3px 10px;border-radius:6px;font-size:.68rem;font-weight:600;cursor:pointer;background:transparent;border:none;color:var(--muted);transition:all .15s}
.dt:hover{color:var(--text)}
.dt.active{background:var(--sf);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.3)}

/* ── Table ── */
#q-body{flex:1;overflow-y:auto;padding:0 18px 18px;display:none}
#q-body.visible{display:block}
#q-body::-webkit-scrollbar{width:3px}
#q-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px}
table{width:100%;border-collapse:collapse;margin-top:8px}
thead th{
  text-align:left;padding:8px 8px;font-size:.67rem;font-weight:600;
  color:var(--muted);text-transform:uppercase;letter-spacing:.06em;
  position:sticky;top:0;background:var(--bg);cursor:pointer;user-select:none;white-space:nowrap;
  border-bottom:1px solid var(--border);
}
thead th:first-child,thead th:nth-child(2){cursor:default}
thead th:hover:not(:first-child):not(:nth-child(2)){color:var(--text)}
thead th.sorted .si{color:var(--a2)}
tbody tr{border-bottom:1px solid rgba(37,42,61,.6);transition:background .1s,box-shadow .12s}
tbody tr:hover{background:rgba(124,106,255,.04);box-shadow:inset 3px 0 0 var(--accent)}
tbody tr.is-done{opacity:.45}
tbody tr.is-done .q-link{text-decoration:line-through;color:var(--muted)}
tbody td{padding:9px 8px;font-size:.83rem}
.ck{background:none;border:none;cursor:pointer;color:transparent;padding:2px;transition:color .15s,transform .2s cubic-bezier(.34,1.56,.64,1);line-height:1}
tbody tr:hover .ck{color:var(--muted)}
.ck.on,.ck:hover{color:var(--done)!important;transform:scale(1.15)}
.rh{background:none;border:none;cursor:pointer;color:transparent;padding:2px;transition:color .15s,transform .2s cubic-bezier(.34,1.56,.64,1);line-height:1}
tbody tr:hover .rh{color:var(--muted)}
.rh.on,.rh:hover{color:var(--heart)!important;transform:scale(1.15)}
.q-link{color:var(--text);text-decoration:none;font-weight:500;transition:color .12s}
.q-link:hover{color:var(--a2)}
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:.63rem;font-weight:600;border:1px solid}
.badge::before{content:'';width:4px;height:4px;border-radius:50%;background:currentColor;flex-shrink:0}
.bE{color:var(--easy);background:rgba(34,197,94,.08);border-color:rgba(34,197,94,.25)}
.bM{color:var(--med);background:rgba(245,158,11,.08);border-color:rgba(245,158,11,.25)}
.bH{color:var(--hard);background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.25)}
.fw{display:flex;align-items:center;gap:6px;min-width:80px}
.fb{flex:1;height:3px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden}
.ff{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--accent),var(--a2))}
.fv{font-size:.68rem;color:var(--muted);width:30px;text-align:right;font-variant-numeric:tabular-nums}

/* ══════ FAVORITES / COMPLETED ══════ */
#view-favorites{min-height:calc(100vh - 52px)}
.fav-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;gap:12px;color:var(--muted);text-align:center}
.fav-empty svg{opacity:.15}
.fav-empty .hint{font-size:.75rem;opacity:.55}
.fav-block{padding:24px 24px 0}
.fav-block+.fav-block{padding-top:0}
.fav-block:last-child{padding-bottom:28px}
.fav-block-title{font-size:.78rem;font-weight:700;margin-bottom:14px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);display:flex;align-items:center;gap:8px}
.fav-block-title svg{color:var(--heart);flex-shrink:0}
.fav-block-title.done-title svg{color:var(--done)}
.fq-table{width:100%;border-collapse:collapse}
.fq-table thead th{text-align:left;padding:7px 10px;font-size:.67rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border)}
.fq-table tbody tr{border-bottom:1px solid rgba(37,42,61,.6);transition:background .1s}
.fq-table tbody tr:hover{background:rgba(124,106,255,.04)}
.fq-table tbody td{padding:8px 10px;font-size:.83rem}
.unfav,.undone{background:none;border:none;cursor:pointer;padding:3px;transition:transform .15s,opacity .15s;line-height:1}
.unfav{color:var(--heart)}
.undone{color:var(--done)}
.unfav:hover,.undone:hover{transform:scale(1.2);opacity:.7}
.co-tag{
  font-size:.63rem;padding:2px 8px;border-radius:20px;
  background:var(--s2);border:1px solid var(--border);color:var(--muted);
  text-transform:capitalize;cursor:pointer;transition:border-color .15s,color .15s;
}
.co-tag:hover{border-color:var(--accent);color:var(--a2)}

/* ── shared ── */
.spinner{width:26px;height:26px;border:2px solid rgba(255,255,255,.07);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:36px auto}
@keyframes spin{to{transform:rotate(360deg)}}
.sk{background:linear-gradient(90deg,var(--sf) 25%,var(--s2) 50%,var(--sf) 75%);background-size:200% 100%;animation:sh 1.4s infinite;border-radius:4px;height:11px;margin:7px 10px}
@keyframes sh{to{background-position:-200% 0}}
#toast{position:fixed;bottom:20px;right:20px;background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:9px 16px;font-size:.78rem;color:var(--muted);opacity:0;transition:opacity .25s;pointer-events:none;z-index:200;box-shadow:0 4px 12px rgba(0,0,0,.3)}
#toast.show{opacity:1}
@media(max-width:700px){
  #view-browse.active{grid-template-columns:1fr;grid-template-rows:auto 1fr}
  .hero h1{font-size:2rem}
  .co-grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr))}
}
</style>
</head>
<body>

<header id="app-header">
  <div class="logo">Leet<em>Code</em></div>
  <nav>
    <button class="nav-btn active" onclick="navigate('home')">Home</button>
    <button class="nav-btn" onclick="navigate('browse')">Browse</button>
    <button class="nav-btn" id="fav-nav-btn" onclick="navigate('favorites')">
      Saved<span class="nbadge" id="fav-count" style="display:none">0</span>
    </button>
  </nav>
  <button id="refresh-btn" onclick="clearCacheAndReload()">↺ Refresh</button>
</header>

<!-- HOME -->
<div id="view-home" class="view active">
  <div class="hero">
    <div class="hero-eyebrow">663 companies · updated live</div>
    <h1><span class="thin">Ace your</span><br><span class="grad">Interview.</span></h1>
    <p>Company-wise LeetCode questions sorted by interview frequency.</p>
    <div class="hero-search-wrap">
      <input id="hero-search" type="text" placeholder="Search any company…"
        oninput="heroSearch(this.value)" onkeydown="heroKey(event)" autocomplete="off">
      <svg class="srch-ico" width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
        <circle cx="11" cy="11" r="8"/><path stroke-linecap="round" d="m21 21-4.35-4.35"/>
      </svg>
      <div id="hero-drop"></div>
    </div>
  </div>

  <div id="home-fav-section" style="display:none">
    <div class="home-section">
      <div class="sec-head">
        <div class="sec-title">Favorited</div>
      </div>
      <div class="co-grid" id="home-fav-grid"></div>
    </div>
  </div>

  <div class="home-section">
    <div class="sec-head">
      <div class="sec-title">Popular</div>
      <button class="sec-more" onclick="navigate('browse')">Browse all 663 →</button>
    </div>
    <div class="co-grid" id="popular-grid"></div>
  </div>
</div>

<!-- BROWSE -->
<div id="view-browse" class="view">
  <div id="sidebar">
    <div id="search-wrap">
      <input id="company-search" type="text" placeholder="Search companies…" oninput="filterCompanies(this.value)">
    </div>
    <div id="company-list">
      <div class="sk" style="width:62%"></div><div class="sk" style="width:48%"></div>
      <div class="sk" style="width:72%"></div><div class="sk" style="width:55%"></div>
      <div class="sk" style="width:66%"></div>
    </div>
  </div>
  <div id="content">
    <div id="q-header">
      <div class="q-title-row">
        <span id="q-company-name"></span>
        <button class="qco-heart" id="qco-heart-btn" onclick="toggleFavCo(activeCompany)"></button>
        <div class="stat-chips">
          <span class="sc e" id="se"></span>
          <span class="sc m" id="sm"></span>
          <span class="sc h" id="sh"></span>
          <span class="sc d" id="sd" style="display:none"></span>
        </div>
      </div>
      <div class="period-tabs" id="period-tabs"></div>
      <div class="q-search-row">
        <input id="q-search" type="text" placeholder="Filter questions…" oninput="renderTable()">
        <div class="diff-filter">
          <button class="diff-btn" onclick="toggleDiff('Easy',this)">Easy</button>
          <button class="diff-btn" onclick="toggleDiff('Medium',this)">Medium</button>
          <button class="diff-btn" onclick="toggleDiff('Hard',this)">Hard</button>
        </div>
        <div class="done-tabs">
          <button class="dt active" onclick="setDoneFilter('all',this)">All</button>
          <button class="dt" onclick="setDoneFilter('todo',this)">To do</button>
          <button class="dt" onclick="setDoneFilter('done',this)">Done</button>
        </div>
      </div>
    </div>
    <div id="empty-state">
      <svg width="48" height="48" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
      </svg>
      <p>Select a company to see its questions</p>
      <p class="hint">or use the search bar</p>
    </div>
    <div id="q-body">
      <table>
        <thead><tr>
          <th style="width:28px"></th>
          <th style="width:28px"></th>
          <th style="width:38px" onclick="sortBy('id')">#<span class="si"> ↕</span></th>
          <th onclick="sortBy('title')">Title<span class="si"> ↕</span></th>
          <th style="width:90px" onclick="sortBy('difficulty')">Difficulty<span class="si"> ↕</span></th>
          <th style="width:70px" onclick="sortBy('acceptance')">Accept<span class="si"> ↕</span></th>
          <th style="width:136px" onclick="sortBy('frequency')">Frequency<span class="si"> ↕</span></th>
        </tr></thead>
        <tbody id="q-tbody"></tbody>
      </table>
      <p id="no-res" style="display:none;text-align:center;padding:28px;color:var(--muted);font-size:.84rem">No questions match your filters.</p>
    </div>
  </div>
</div>

<!-- FAVORITES / COMPLETED -->
<div id="view-favorites" class="view">
  <div id="fav-content"></div>
</div>

<div id="toast"></div>
<script>
const REPO='snehasishroy/leetcode-companywise-interview-questions';
const RAW=`https://raw.githubusercontent.com/${REPO}/master`;
const API=`https://api.github.com/repos/${REPO}/contents`;
const SI='https://cdn.jsdelivr.net/npm/simple-icons@latest/icons';
const TTL=3600000;

const PERIODS=[
  {key:'all',label:'All Time'},
  {key:'thirty-days',label:'30 Days'},
  {key:'three-months',label:'3 Months'},
  {key:'six-months',label:'6 Months'},
  {key:'more-than-six-months',label:'6+ Months'},
];

const POPULAR=[
  {key:'google',        slug:'google',        bg:'#4285F4'},
  {key:'amazon',        slug:'amazon',        bg:'#FF9900'},
  {key:'meta',          slug:'meta',          bg:'#0866FF'},
  {key:'microsoft',     slug:'microsoft',     bg:'#00A4EF'},
  {key:'apple',         slug:'apple',         bg:'#555555'},
  {key:'netflix',       slug:'netflix',       bg:'#E50914'},
  {key:'uber',          slug:'uber',          bg:'#000000'},
  {key:'airbnb',        slug:'airbnb',        bg:'#FF5A5F'},
  {key:'linkedin',      slug:'linkedin',      bg:'#0A66C2'},
  {key:'stripe',        slug:'stripe',        bg:'#635BFF'},
  {key:'spotify',       slug:'spotify',       bg:'#1DB954'},
  {key:'shopify',       slug:'shopify',       bg:'#7AB55C'},
  {key:'adobe',         slug:'adobe',         bg:'#FA0F00'},
  {key:'salesforce',    slug:'salesforce',    bg:'#00A1E0'},
  {key:'goldman-sachs', slug:'goldmansachs',  bg:'#1A5276'},
  {key:'atlassian',     slug:'atlassian',     bg:'#0052CC'},
  {key:'doordash',      slug:'doordash',      bg:'#FF3008'},
  {key:'snowflake',     slug:'snowflake',     bg:'#29B5E8'},
  {key:'tiktok',        slug:'tiktok',        bg:'#010101'},
  {key:'tesla',         slug:'tesla',         bg:'#CC0000'},
  {key:'nvidia',        slug:'nvidia',        bg:'#76B900'},
  {key:'coinbase',      slug:'coinbase',      bg:'#0052FF'},
  {key:'twitter',       slug:'x',             bg:'#000000'},
  {key:'databricks',    slug:'databricks',    bg:'#FF3621'},
];

/* state */
let companies=[],filtered=[],activeCompany=null;
let activePeriod='all',questions=[];
let sortKey='frequency',sortDir=-1;
let activeDiffs=new Set();
let doneFilter='all';

/* ── storage ── */
function getFavCos(){try{return new Set(JSON.parse(localStorage.getItem('lc:fav:co')||'[]'))}catch{return new Set()}}
function setFavCos(s){localStorage.setItem('lc:fav:co',JSON.stringify([...s]))}
function getFavQs(){try{return JSON.parse(localStorage.getItem('lc:fav:q')||'[]')}catch{return[]}}
function setFavQs(a){localStorage.setItem('lc:fav:q',JSON.stringify(a))}
function getDone(){try{return new Set(JSON.parse(localStorage.getItem('lc:done')||'[]'))}catch{return new Set()}}
function setDone(s){localStorage.setItem('lc:done',JSON.stringify([...s]))}

/* ── cache ── */
function cGet(k){try{const r=localStorage.getItem(k);if(!r)return null;const{ts,d}=JSON.parse(r);if(Date.now()-ts>TTL){localStorage.removeItem(k);return null;}return d;}catch{return null;}}
function cSet(k,d){try{localStorage.setItem(k,JSON.stringify({ts:Date.now(),d}));}catch{}}
function clearCacheAndReload(){
  Object.keys(localStorage).filter(k=>k.startsWith('lc:')&&!k.startsWith('lc:fav')&&k!=='lc:done').forEach(k=>localStorage.removeItem(k));
  toast('Cache cleared — fetching fresh data');setTimeout(()=>location.reload(),500);
}

/* ── navigation ── */
function navigate(view){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(`view-${view}`).classList.add('active');
  const names=['home','browse','favorites'];
  document.querySelectorAll('.nav-btn')[names.indexOf(view)]?.classList.add('active');
  if(view==='favorites')renderFavorites();
  if(view==='home'){renderHomeFavs();}
  if(view==='browse'&&!companies.length)loadCompanies();
}

/* ── hearts & done ── */
function toggleFavCo(co,e){
  if(e)e.stopPropagation();
  const s=getFavCos();
  if(s.has(co)){s.delete(co);toast(`Removed ${fmt(co)} from saved`);}
  else{s.add(co);toast(`Saved ${fmt(co)}`);}
  setFavCos(s);updateFavCount();updateHeartsCo(co);renderHomeFavs();
  if(document.getElementById('view-favorites').classList.contains('active'))renderFavorites();
}
function toggleFavQ(q,btn){
  const arr=getFavQs();const idx=arr.findIndex(x=>x.url===q.url);
  if(idx>=0){arr.splice(idx,1);btn.classList.remove('on');btn.innerHTML=hrtSVG(false);toast('Removed from saved');}
  else{arr.push({...q,company:activeCompany});btn.classList.add('on');btn.innerHTML=hrtSVG(true);toast('Saved question');}
  setFavQs(arr);updateFavCount();
  if(document.getElementById('view-favorites').classList.contains('active'))renderFavorites();
}
function toggleDone(url,btn){
  const s=getDone();const wasOn=s.has(url);
  if(wasOn){s.delete(url);btn.classList.remove('on');btn.innerHTML=chkSVG(false);}
  else{s.add(url);btn.classList.add('on');btn.innerHTML=chkSVG(true);}
  setDone(s);
  const row=btn.closest('tr');if(row)row.classList.toggle('is-done',!wasOn);
  updateStats();updateFavCount();
  if(document.getElementById('view-favorites').classList.contains('active'))renderFavorites();
}
function unfavQ(url){
  setFavQs(getFavQs().filter(x=>x.url!==url));updateFavCount();renderFavorites();
  document.querySelectorAll('.rh').forEach(btn=>{const lnk=btn.closest('tr')?.querySelector('.q-link');if(lnk&&lnk.href===url){btn.classList.remove('on');btn.innerHTML=hrtSVG(false);}});
}
function undoneQ(url){
  const s=getDone();s.delete(url);setDone(s);updateStats();updateFavCount();renderFavorites();
  document.querySelectorAll('.ck').forEach(btn=>{const lnk=btn.closest('tr')?.querySelector('.q-link');if(lnk&&lnk.href===url){btn.classList.remove('on');btn.innerHTML=chkSVG(false);btn.closest('tr')?.classList.remove('is-done');}});
}

function updateFavCount(){
  const total=getFavCos().size+getFavQs().length;
  const el=document.getElementById('fav-count');
  el.textContent=total;el.style.display=total?'':'none';
}
function updateHeartsCo(co){
  document.querySelectorAll(`.ci-heart[data-co="${co}"],.card-heart[data-co="${co}"]`).forEach(btn=>{const on=getFavCos().has(co);btn.classList.toggle('on',on);btn.innerHTML=hrtSVG(on);});
  if(activeCompany===co){const btn=document.getElementById('qco-heart-btn');const on=getFavCos().has(co);btn.classList.toggle('on',on);btn.innerHTML=hrtSVG(on);}
}

/* ── companies ── */
async function loadCompanies(){
  const c=cGet('lc:companies');if(c){companies=c;renderCompanies();return;}
  try{
    const r=await fetch(`${API}/`);if(!r.ok)throw 0;
    const items=await r.json();
    companies=items.filter(i=>i.type==='dir'&&!i.name.includes('.')).map(i=>i.name).sort();
    cSet('lc:companies',companies);renderCompanies();
  }catch{document.getElementById('company-list').innerHTML='<p style="padding:14px;color:var(--muted);font-size:.78rem">Failed to load. Check connection.</p>';}
}
function renderCompanies(){filtered=companies;rebuildList();renderPopularGrid();}
function filterCompanies(q){q=q.toLowerCase();filtered=q?companies.filter(c=>c.toLowerCase().includes(q)):companies;rebuildList();}
function rebuildList(){
  const list=document.getElementById('company-list');
  if(!filtered.length){list.innerHTML='<p style="padding:14px;color:var(--muted);font-size:.78rem">No companies found.</p>';return;}
  const favCos=getFavCos();
  list.innerHTML=filtered.map(c=>{const on=favCos.has(c);return`<div class="ci ${c===activeCompany?'active':''}" onclick="selectCompany('${c}')">
    <div class="ci-icon">${c.slice(0,2)}</div>
    <span class="ci-name">${c.replace(/-/g,' ')}</span>
    <button class="ci-heart ${on?'on':''}" data-co="${c}" onclick="toggleFavCo('${c}',event)">${hrtSVG(on)}</button>
  </div>`;}).join('');
}

/* ── select & load ── */
async function selectCompany(co,switchView=false){
  if(switchView)navigate('browse');
  if(activeCompany===co&&!switchView)return;
  activeCompany=co;activePeriod='all';activeDiffs=new Set();doneFilter='all';
  document.getElementById('q-search').value='';resetDiffBtns();
  document.querySelectorAll('.dt').forEach((b,i)=>b.classList.toggle('active',i===0));
  rebuildList();
  document.getElementById('empty-state').style.display='none';
  document.getElementById('q-header').classList.add('visible');
  document.getElementById('q-body').classList.add('visible');
  document.getElementById('q-company-name').textContent=fmt(co);
  const hBtn=document.getElementById('qco-heart-btn');const on=getFavCos().has(co);hBtn.classList.toggle('on',on);hBtn.innerHTML=hrtSVG(on);
  buildPeriodTabs();
  document.getElementById('q-tbody').innerHTML='<tr><td colspan="7"><div class="spinner"></div></td></tr>';
  document.getElementById('se').textContent=document.getElementById('sm').textContent=document.getElementById('sh').textContent='';
  document.getElementById('sd').style.display='none';
  await loadQ(co,'all');
}
async function loadQ(co,period){
  const key=`lc:${co}:${period}`,c=cGet(key);
  if(c){questions=c;renderTable();updateStats();return;}
  try{
    const r=await fetch(`${RAW}/${co}/${period}.csv`);if(!r.ok)throw 0;
    questions=parseCSV(await r.text());cSet(key,questions);renderTable();updateStats();
  }catch{document.getElementById('q-tbody').innerHTML='<tr><td colspan="7" style="text-align:center;padding:28px;color:var(--muted);font-size:.84rem">No data for this period.</td></tr>';}
}

function buildPeriodTabs(){
  document.getElementById('period-tabs').innerHTML=PERIODS.map(p=>`<button class="ptab ${p.key===activePeriod?'active':''}" onclick="switchPeriod('${p.key}',this)">${p.label}</button>`).join('');
}
function switchPeriod(key,btn){
  activePeriod=key;document.querySelectorAll('.ptab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');
  document.getElementById('q-tbody').innerHTML='<tr><td colspan="7"><div class="spinner"></div></td></tr>';
  loadQ(activeCompany,key);
}
function toggleDiff(d,btn){if(activeDiffs.has(d)){activeDiffs.delete(d);btn.className='diff-btn';}else{activeDiffs.add(d);btn.className='diff-btn '+{Easy:'ae',Medium:'am',Hard:'ah'}[d];}renderTable();}
function resetDiffBtns(){document.querySelectorAll('.diff-btn').forEach(b=>b.className='diff-btn');}
function setDoneFilter(f,btn){doneFilter=f;document.querySelectorAll('.dt').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderTable();}
function sortBy(k){
  if(sortKey===k)sortDir*=-1;else{sortKey=k;sortDir=k==='frequency'?-1:1;}
  const idx={id:2,title:3,difficulty:4,acceptance:5,frequency:6};
  document.querySelectorAll('thead th').forEach((th,i)=>{th.classList.toggle('sorted',i===idx[k]);const si=th.querySelector('.si');if(si)si.textContent=i===idx[k]?(sortDir===1?' ↑':' ↓'):' ↕';});
  renderTable();
}

const diffOrd={Easy:0,Medium:1,Hard:2};
const diffCls={Easy:'bE',Medium:'bM',Hard:'bH'};
function renderTable(){
  const q=document.getElementById('q-search').value.toLowerCase();
  let rows=questions.slice();
  if(activeDiffs.size)rows=rows.filter(r=>activeDiffs.has(r.difficulty));
  if(q)rows=rows.filter(r=>r.title.toLowerCase().includes(q));
  const doneSet=getDone();
  if(doneFilter==='todo')rows=rows.filter(r=>!doneSet.has(r.url));
  else if(doneFilter==='done')rows=rows.filter(r=>doneSet.has(r.url));
  rows.sort((a,b)=>{let av=a[sortKey],bv=b[sortKey];if(sortKey==='difficulty'){av=diffOrd[av]??99;bv=diffOrd[bv]??99;}if(sortKey==='title'){av=av.toLowerCase();bv=bv.toLowerCase();}return av<bv?-sortDir:av>bv?sortDir:0;});
  const tbody=document.getElementById('q-tbody'),noRes=document.getElementById('no-res');
  if(!rows.length){tbody.innerHTML='';noRes.style.display='block';return;}
  noRes.style.display='none';
  const favQs=getFavQs();
  tbody.innerHTML=rows.map(r=>{
    const done=doneSet.has(r.url),fav=favQs.some(x=>x.url===r.url);
    const qJson=JSON.stringify({id:r.id,url:r.url,title:r.title,difficulty:r.difficulty,acceptance:r.acceptance,frequency:r.frequency}).replace(/"/g,'&quot;');
    return`<tr class="${done?'is-done':''}">
      <td><button class="ck ${done?'on':''}" onclick="toggleDone('${r.url}',this)" title="Mark done">${chkSVG(done)}</button></td>
      <td><button class="rh ${fav?'on':''}" onclick="toggleFavQ(JSON.parse(this.dataset.q.replace(/&quot;/g,'\"')),this)" data-q="${qJson}" title="Save">${hrtSVG(fav)}</button></td>
      <td style="color:var(--muted)">${r.id}</td>
      <td><a class="q-link" href="${r.url}" target="_blank" rel="noopener">${esc(r.title)}</a></td>
      <td><span class="badge ${diffCls[r.difficulty]||'bE'}">${r.difficulty}</span></td>
      <td style="color:var(--muted)">${r.acceptance.toFixed(1)}%</td>
      <td><div class="fw"><div class="fb"><div class="ff" style="width:${r.frequency}%"></div></div><span class="fv">${r.frequency.toFixed(1)}%</span></div></td>
    </tr>`;
  }).join('');
}

function updateStats(){
  const c={Easy:0,Medium:0,Hard:0};questions.forEach(q=>{if(c[q.difficulty]!==undefined)c[q.difficulty]++;});
  const doneSet=getDone();const doneCo=questions.filter(q=>doneSet.has(q.url)).length;
  document.getElementById('se').textContent=`${c.Easy} Easy`;
  document.getElementById('sm').textContent=`${c.Medium} Med`;
  document.getElementById('sh').textContent=`${c.Hard} Hard`;
  const sd=document.getElementById('sd');
  if(doneCo>0){sd.textContent=`${doneCo} Done`;sd.style.display='';}
  else{sd.style.display='none';}
}

/* ── home page ── */
function renderPopularGrid(){
  const favCos=getFavCos();
  document.getElementById('popular-grid').innerHTML=POPULAR.map(p=>coCard(p.key,p.slug,p.bg,favCos.has(p.key))).join('');
}
function renderHomeFavs(){
  const favCos=getFavCos();const sec=document.getElementById('home-fav-section');
  if(!favCos.size){sec.style.display='none';return;}
  sec.style.display='';
  document.getElementById('home-fav-grid').innerHTML=[...favCos].map(co=>{const p=POPULAR.find(x=>x.key===co);return coCard(co,p?.slug||null,p?.bg||'#7c6aff',true);}).join('');
}

function imgErr(img){
  img.style.display='none';
  const fb=document.createElement('span');
  fb.textContent=img.dataset.fb;
  fb.style.cssText='font-size:1rem;font-weight:800;color:#fff;letter-spacing:-.02em';
  img.parentNode.appendChild(fb);
}
function coCard(key,slug,bg,isFav){
  const name=key.replace(/-/g,' ');const initials=key.slice(0,2).toUpperCase();
  const logoHtml=slug
    ?`<div class="co-logo-wrap" style="background:${bg}"><img src="${SI}/${slug}.svg" data-fb="${initials}" alt="${initials}" onerror="imgErr(this)" width="28" height="28"></div>`
    :`<div class="co-logo-wrap" style="background:${bg}"><span style="font-size:1rem;font-weight:800;color:#fff">${initials}</span></div>`;
  return`<div class="co-card ${isFav?'is-fav':''}" onclick="selectCompany('${key}',true)">
    <button class="card-heart ${isFav?'on':''}" data-co="${key}" onclick="toggleFavCo('${key}',event)">${hrtSVG(isFav)}</button>
    ${logoHtml}
    <div class="co-card-name">${name}</div>
  </div>`;
}

/* ── hero search ── */
let heroIdx=-1;
function heroSearch(q){
  const drop=document.getElementById('hero-drop');
  if(!q.trim()){drop.className='';drop.innerHTML='';return;}
  if(!companies.length){drop.className='open';drop.innerHTML='<div class="drop-item" style="color:var(--muted)">Loading…</div>';return;}
  const matches=companies.filter(c=>c.toLowerCase().includes(q.toLowerCase())).slice(0,8);
  if(!matches.length){drop.className='open';drop.innerHTML='<div class="drop-item" style="color:var(--muted)">No results</div>';return;}
  heroIdx=-1;drop.className='open';
  drop.innerHTML=matches.map(c=>`<div class="drop-item" onclick="heroSel('${c}')"><div class="drop-ico">${c.slice(0,2)}</div><span style="text-transform:capitalize">${c.replace(/-/g,' ')}</span></div>`).join('');
}
function heroKey(e){
  const items=document.querySelectorAll('#hero-drop .drop-item');
  if(e.key==='ArrowDown'){heroIdx=Math.min(heroIdx+1,items.length-1);items.forEach((el,i)=>el.style.background=i===heroIdx?'var(--s2)':'');}
  else if(e.key==='ArrowUp'){heroIdx=Math.max(heroIdx-1,0);items.forEach((el,i)=>el.style.background=i===heroIdx?'var(--s2)':'');}
  else if(e.key==='Enter'){
    if(heroIdx>=0&&items[heroIdx])items[heroIdx].click();
    else{const q=document.getElementById('hero-search').value.toLowerCase().trim();const m=companies.find(c=>c.toLowerCase()===q)||companies.find(c=>c.toLowerCase().includes(q));if(m)heroSel(m);}
  }
  else if(e.key==='Escape'){document.getElementById('hero-drop').className='';document.getElementById('hero-search').blur();}
}
function heroSel(co){document.getElementById('hero-drop').className='';document.getElementById('hero-search').value='';selectCompany(co,true);}
document.addEventListener('click',e=>{if(!e.target.closest('.hero-search-wrap'))document.getElementById('hero-drop').className='';});

/* ── favorites view ── */
function renderFavorites(){
  const favCos=getFavCos(),favQs=getFavQs(),doneSet=getDone();
  const doneArr=favQs.filter(q=>doneSet.has(q.url));
  const el=document.getElementById('fav-content');
  if(!favCos.size&&!favQs.length&&!doneSet.size){
    el.innerHTML=`<div class="fav-empty">
      <svg width="44" height="44" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1">
        <path stroke-linecap="round" d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
      </svg>
      <p>Nothing saved yet</p>
      <p class="hint">Heart companies or questions to save them here</p>
    </div>`;return;
  }
  let html='';
  if(favCos.size){
    html+=`<div class="fav-block"><div class="fav-block-title"><svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>Saved Companies</div><div class="co-grid">`;
    [...favCos].forEach(co=>{const p=POPULAR.find(x=>x.key===co);html+=coCard(co,p?.slug||null,p?.bg||'#7c6aff',true);});
    html+=`</div></div>`;
  }
  if(favQs.length){
    html+=`<div class="fav-block"><div class="fav-block-title"><svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>Saved Questions</div>
    <table class="fq-table"><thead><tr><th style="width:28px"></th><th>Title</th><th style="width:90px">Company</th><th style="width:88px">Difficulty</th><th style="width:72px">Accept</th></tr></thead><tbody>`;
    favQs.forEach(q=>{
      const done=doneSet.has(q.url);
      html+=`<tr style="${done?'opacity:.45':''}"><td><button class="unfav" onclick="unfavQ('${q.url}')" title="Remove">${hrtSVG(true)}</button></td><td><a class="q-link" href="${esc(q.url)}" target="_blank" rel="noopener" style="${done?'text-decoration:line-through;color:var(--muted)':''}">${esc(q.title)}</a></td><td><span class="co-tag" onclick="selectCompany('${esc(q.company||'')}',true)">${esc((q.company||'').replace(/-/g,' '))}</span></td><td><span class="badge ${diffCls[q.difficulty]||'bE'}">${q.difficulty}</span></td><td style="color:var(--muted)">${q.acceptance.toFixed(1)}%</td></tr>`;
    });
    html+=`</tbody></table></div>`;
  }
  // completed section
  const allDone=[...doneSet];
  if(allDone.length){
    // gather question details from cache or favQs
    const doneQs=[];
    allDone.forEach(url=>{
      const fromFav=favQs.find(q=>q.url===url);
      if(fromFav)doneQs.push(fromFav);
      else doneQs.push({url,title:url.split('/').pop().replace(/-/g,' '),difficulty:'',acceptance:0,company:''});
    });
    html+=`<div class="fav-block"><div class="fav-block-title done-title"><svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5l-4.5-4.5 1.41-1.41L10 13.67l7.09-7.09 1.41 1.41L10 16.5z"/></svg>Completed (${doneQs.length})</div>
    <table class="fq-table"><thead><tr><th style="width:28px"></th><th>Title</th><th style="width:90px">Company</th><th style="width:88px">Difficulty</th></tr></thead><tbody>`;
    doneQs.forEach(q=>{
      html+=`<tr><td><button class="undone" onclick="undoneQ('${q.url}')" title="Mark incomplete">${chkSVG(true)}</button></td><td><a class="q-link" href="${esc(q.url)}" target="_blank" rel="noopener" style="text-decoration:line-through;color:var(--muted)">${esc(q.title)}</a></td><td>${q.company?`<span class="co-tag" onclick="selectCompany('${esc(q.company)}',true)">${esc(q.company.replace(/-/g,' '))}</span>`:''}</td><td>${q.difficulty?`<span class="badge ${diffCls[q.difficulty]||'bE'}">${q.difficulty}</span>`:''}</td></tr>`;
    });
    html+=`</tbody></table></div>`;
  }
  el.innerHTML=html;
}

/* ── CSV ── */
function parseCSV(txt){
  const lines=txt.trim().split('\n');if(lines.length<2)return[];
  return lines.slice(1).map(line=>{
    const cols=[];let cur='',inQ=false;
    for(const ch of line){if(ch==='"'){inQ=!inQ;continue;}if(ch===','&&!inQ){cols.push(cur.trim());cur='';continue;}cur+=ch;}
    cols.push(cur.trim());
    return{id:parseInt(cols[0])||0,url:cols[1]||'',title:cols[2]||'',difficulty:cols[3]||'',acceptance:parseFloat(cols[4])||0,frequency:parseFloat(cols[5])||0};
  }).filter(q=>q.title);
}

/* ── icons ── */
const H_O=`<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`;
const H_F=`<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>`;
const C_O=`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="12" cy="12" r="9"/><path stroke-linecap="round" stroke-linejoin="round" d="m9 12 2 2 4-4"/></svg>`;
const C_F=`<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5-4.5-4.5 1.41-1.41L10 13.67l7.09-7.09 1.41 1.41L10 16.5z"/></svg>`;
function hrtSVG(f){return f?H_F:H_O}
function chkSVG(f){return f?C_F:C_O}

/* ── utils ── */
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmt(s){return s.replace(/-/g,' ');}
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2200);}

/* ── init ── */
updateFavCount();renderPopularGrid();renderHomeFavs();loadCompanies();
const defTh=document.querySelectorAll('thead th')[6];
if(defTh){defTh.classList.add('sorted');defTh.querySelector('.si').textContent=' ↓';}
